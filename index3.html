<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天気予報チェッカー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
            background: linear-gradient(160deg, #0d1f2d, #1a3545, #0d2030);
            color: #fff;
            padding: 16px;
            line-height: 1.6;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        header {
            margin-bottom: 20px;
        }

        h1 {
            font-size: 18px;
            color: #4BAED8;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .city-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .city-btn {
            padding: 10px 16px;
            border: 1px solid rgba(75, 174, 216, 0.4);
            background: rgba(75, 174, 216, 0.2);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.15s;
        }

        .city-btn.active {
            background: rgba(75, 174, 216, 0.5);
            border-color: #4BAED8;
        }

        .city-btn:hover:not(.active) {
            background: rgba(75, 174, 216, 0.3);
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            align-items: center;
        }

        .update-btn {
            padding: 10px 20px;
            background: rgba(75, 174, 216, 0.5);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.15s;
        }

        .update-btn:hover {
            background: rgba(75, 174, 216, 0.7);
        }

        .update-btn:active {
            transform: scale(0.98);
        }

        .update-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .error-message {
            background: rgba(255, 60, 60, 0.2);
            border: 1px solid rgba(255, 80, 80, 0.5);
            color: rgba(255, 160, 160, 0.9);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 12px;
        }

        .forecast-service {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(75, 174, 216, 0.3);
        }

        .service-title {
            background: rgba(75, 174, 216, 0.3);
            padding: 12px 16px;
            font-weight: 600;
            font-size: 13px;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(75, 174, 216, 0.3);
        }

        .scroll-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overflow-y: hidden;
        }

        table {
            border-collapse: collapse;
            font-size: 11px;
            min-width: 100%;
        }

        th {
            background: rgba(75, 174, 216, 0.2);
            color: rgba(255, 255, 255, 0.7);
            padding: 6px 4px;
            text-align: center;
            border: 1px solid rgba(75, 174, 216, 0.3);
            min-width: 36px;
            font-weight: 600;
            white-space: nowrap;
        }

        td {
            padding: 6px 4px;
            text-align: center;
            border: 1px solid rgba(75, 174, 216, 0.3);
            min-width: 36px;
            height: 32px;
            color: #cbd5e1;
        }

        .label-cell {
            background: rgba(75, 174, 216, 0.15);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
        }

        .precip-cell {
            font-weight: bold;
            font-size: 12px;
        }

        /* 降水量の色分け */
        .precip-0 { background: rgba(75, 174, 216, 0.1); color: #cbd5e1; }
        .precip-0-5 { background: rgba(59, 130, 246, 0.25); color: #fff; }
        .precip-1 { background: rgba(59, 130, 246, 0.35); color: #fff; }
        .precip-2 { background: rgba(59, 130, 246, 0.5); color: #fff; }
        .precip-3 { background: rgba(59, 130, 246, 0.65); color: #fff; }
        .precip-5 { background: rgba(59, 130, 246, 0.8); color: #fff; }
        .precip-10plus { background: rgba(59, 130, 246, 1); color: #fff; }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            h1 {
                font-size: 16px;
            }

            th, td {
                padding: 4px 2px;
                min-width: 32px;
                font-size: 10px;
            }

            .city-btn {
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌧️ 天気予報チェッカー</h1>
            <p class="subtitle">72時間先までの降水量を確認（色が濃いほど雨量が多い）</p>
        </header>

        <div class="city-selector">
            <button class="city-btn active" data-city="kakogawa">加古川市</button>
            <button class="city-btn" data-city="ono">小野市</button>
            <button class="city-btn" data-city="nishiwaki">西脇市</button>
        </div>

        <div class="controls">
            <button class="update-btn" id="updateBtn">更新</button>
            <span class="loading-text" id="loadingStatus"></span>
        </div>

        <div id="errorContainer"></div>

        <div id="forecastContainer">
            <div class="empty-state">「更新」ボタンをクリックしてデータを取得してください</div>
        </div>
    </div>

    <script>
        const cityData = {
            kakogawa: {
                name: '加古川市',
                lat: 34.76,
                lng: 134.80
            },
            ono: {
                name: '小野市',
                lat: 34.91,
                lng: 134.53
            },
            nishiwaki: {
                name: '西脇市',
                lat: 35.01,
                lng: 134.38
            }
        };

        let currentCity = 'kakogawa';
        let weatherData = {};

        document.querySelectorAll('.city-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCity = e.target.dataset.city;
                renderForecast();
            });
        });

        document.getElementById('updateBtn').addEventListener('click', fetchWeatherData);

        async function fetchWeatherData() {
            const loading = document.getElementById('loadingStatus');
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = '';
            loading.textContent = '取得中...';
            document.getElementById('updateBtn').disabled = true;

            try {
                for (const [key, city] of Object.entries(cityData)) {
                    try {
                        const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lng}&hourly=precipitation&timezone=Asia%2FTokyo`;
                        const response = await fetch(url);
                        const data = await response.json();

                        if (data.hourly && data.hourly.time && data.hourly.precipitation) {
                            weatherData[key] = {
                                times: data.hourly.time.slice(0, 72),
                                precipitations: data.hourly.precipitation.slice(0, 72)
                            };
                        } else {
                            throw new Error('無効なデータ形式');
                        }
                    } catch (err) {
                        console.error(`${city.name} の取得に失敗:`, err.message);
                        errorContainer.innerHTML += `<div class="error-message">⚠️ ${city.name} の取得に失敗しました</div>`;
                        weatherData[key] = null;
                    }
                }

                renderForecast();
                loading.textContent = '';
                document.getElementById('updateBtn').disabled = false;

            } catch (err) {
                errorContainer.innerHTML = `<div class="error-message">エラー：${err.message}</div>`;
                loading.textContent = '';
                document.getElementById('updateBtn').disabled = false;
            }
        }

        function getPrecipitationClass(value) {
            if (value === 0) return 'precip-0';
            if (value <= 0.5) return 'precip-0-5';
            if (value <= 1) return 'precip-1';
            if (value <= 2) return 'precip-2';
            if (value <= 3) return 'precip-3';
            if (value <= 5) return 'precip-5';
            return 'precip-10plus';
        }

        function renderForecast() {
            const container = document.getElementById('forecastContainer');
            const city = cityData[currentCity];
            const data = weatherData[currentCity];

            if (!data) {
                container.innerHTML = '<div class="empty-state">データが取得できませんでした。</div>';
                return;
            }

            // 時刻から時間部分だけを抽出
            const hours = data.times.map(timeStr => {
                const hour = new Date(timeStr).getHours();
                return hour;
            });

            let html = `
                <div class="forecast-service">
                    <div class="service-title">📍 Open-Meteo API - ${city.name}</div>
                    <div class="scroll-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>時刻</th>
                                    ${hours.map(h => `<th>${h}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="label-cell">降水(mm)</td>
                                    ${data.precipitations.map(p => {
                                        const val = Math.round(p * 10) / 10;
                                        return `<td class="precip-cell ${getPrecipitationClass(val)}">${val}</td>`;
                                    }).join('')}
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            html += `
                <div class="forecast-service">
                    <div class="service-title">📍 日本気象協会 - ${city.name}</div>
                    <div class="empty-state">実装予定</div>
                </div>
            `;

            html += `
                <div class="forecast-service">
                    <div class="service-title">📍 NHK - ${city.name}</div>
                    <div class="empty-state">実装予定</div>
                </div>
            `;

            container.innerHTML = html;
        }
    </script>
</body>
</html>
